# Local development compose (laptops).
# Run with:  docker compose up -d
#
# Counterpart to compose.prod.yaml (the shared EC2 server). Each developer runs
# their OWN local database + app from this single file.
#
# Ports on your laptop:
#   - Postgres -> localhost:5433  (5432 is often taken by a native Postgres)
#   - Flask    -> localhost:5001  (5000 is taken by AirPlay Receiver on macOS)
# Inside the docker network the app reaches Postgres at db:5432.
 
services:
 
  db:
    image: postgres:16-alpine
    container_name: sitinform_db_local
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql   # runs ONCE on first boot
    ports:
      - "5433:5432"        # host 5433 -> container 5432 (avoids native-Postgres clash)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  web:
    build: .
    container_name: sitinform_web_local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      clamav:
        condition: service_started   # not service_healthy — first-boot freshclam download can take minutes; app fails closed per-request until clamd is ready
    env_file: .env
    environment:
      FLASK_ENV: development
      # app talks to Postgres over the docker network (db:5432, NOT the 5433 host port)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      CLAMD_HOST: clamav
    ports:
      - "5001:5000"        # open http://localhost:5001 (5000 = AirPlay on macOS)
    volumes:
      - .:/app             # live code reload during dev

  clamav:
    image: clamav/clamav:stable
    container_name: sitinform_clamav_local
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s   # first boot downloads virus definitions via freshclam

volumes:
  postgres_data:
  clamav_data: