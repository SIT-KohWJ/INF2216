# nginx reverse proxy for SITinform.
# Mounted into the container at /etc/nginx/conf.d/ (see compose.prod.yaml).
# Terminates TLS and proxies to the gunicorn app on the internal docker network.
#
# Cert files must be placed on the server under ./certs (mounted read-only at
# /etc/nginx/certs). They are git-ignored (*.pem / *.key) and never committed:
#   ./certs/fullchain.pem   -> full chain (cert + intermediates)
#   ./certs/privkey.pem     -> private key
# For Let's Encrypt these are /etc/letsencrypt/live/<domain>/{fullchain,privkey}.pem.

# ── HTTP :80 ────────────────────────────────────────────────────────────────
# Redirect everything to HTTPS, EXCEPT the ACME challenge (so certbot can renew).
server {
    listen 80;
    listen [::]:80;
    server_name _;   # replace _ with your domain once you have one

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;   # replace _ with your domain once you have one

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Reasonable modern TLS defaults.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Resolve the "web" service lazily via docker's internal DNS (127.0.0.11)
    # instead of a static upstream. This lets nginx START even if web isn't up
    # yet (avoids "host not found in upstream" crashes during compose up), and
    # picks up web's new IP after a rebuild without restarting nginx.
    resolver 127.0.0.11 valid=10s;
    set $app_upstream http://web:5000;

    # HSTS — enable ONLY with a real CA cert. With a self-signed cert this would
    # pin browsers to a cert they reject, locking users out. Uncomment after you
    # have a domain + real cert.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Liveness probe used by the deploy smoke check.
    location /healthz {
        proxy_pass $app_upstream;
        access_log off;
    }

    location / {
        proxy_pass $app_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
