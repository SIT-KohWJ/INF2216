# Production compose for the shared EC2 instance.
# Run with:  docker compose -f compose.prod.yaml up -d
#
# Key difference from the local compose.yaml: Postgres is NOT exposed to the
# internet. It binds to the VM's loopback only, so it's reachable via an SSH
# tunnel for admin/inspection but never directly from outside the VM.

services:

  # ── PostgreSQL (private) ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sitinform_db
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql   # runs ONCE on first boot
    ports:
      # 127.0.0.1 = the VM's loopback ONLY. Reachable via SSH tunnel, never the
      # internet. The app does NOT use this — it reaches Postgres internally at
      # db:5432 over the docker network below.
      - "127.0.0.1:5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask app (add once you have app code + a Dockerfile) ───────────────────
  # web:
  #   build: .
  #   container_name: sitinform_web
  #   restart: always
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL:         postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  #     SECRET_KEY:           ${SECRET_KEY}
  #     HMAC_SECRET_KEY:      ${HMAC_SECRET_KEY}
  #     FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
  #     FLASK_ENV:            production
  #   expose:
  #     - "5000"          # internal only; nginx reaches it over the network
  #   networks:
  #     - backend

  # ── Nginx reverse proxy / TLS termination (the only public service) ─────────
  # nginx:
  #   image: nginx:alpine
  #   container_name: sitinform_nginx
  #   restart: always
  #   depends_on:
  #     - web
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/conf.d:/etc/nginx/conf.d:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   networks:
  #     - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
