# Production compose for the shared EC2 instance.
# Run with:  docker compose -f compose.prod.yaml up -d
#
# Key difference from the local compose.yaml: Postgres is NOT exposed to the
# internet. It binds to the VM's loopback only, so it's reachable via an SSH
# tunnel for admin/inspection but never directly from outside the VM.
services:
  # ── PostgreSQL (private) ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sitinform_db
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask app ───────────────────────────────────────────────────────────────
  web:
    build: .
    container_name: sitinform_web
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:         postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY:           ${SECRET_KEY}
      HMAC_SECRET_KEY:      ${HMAC_SECRET_KEY}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      FLASK_ENV:            production
    expose:
      - "5000"
    networks:
      - backend

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sitinform_nginx
    restart: always
    depends_on:
      - web
    command: >
      /bin/sh -c "rm -f /var/log/nginx/access.log /var/log/nginx/error.log
      && nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - backend

  # ── Splunk SIEM ─────────────────────────────────────────────────────────────
  splunk:
    image: splunk/splunk:latest
    container_name: sitinform_splunk
    restart: always
    environment:
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
      SPLUNK_PASSWORD: "SITinform@2026"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - splunk_data:/opt/splunk/var
      - /var/log/snort:/var/log/snort:ro
      - ./logs/nginx:/var/log/nginx:ro
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  splunk_data:
