{% extends "base.html" %}
{% block title %}Platform Config - SITinform{% endblock %}
{% block content %}
<div class="page-header">
    <div class="page-header__icon"><i class="fas fa-cogs"></i></div>
    <div class="page-header__body">
        <h1 class="page-header__title">Platform Configuration</h1>
        <p class="page-header__subtitle">Current platform settings and configuration values.</p>
    </div>
</div>
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <table class="table">
                    <tbody>
                        {% for key, value in config.items() %}
                        <tr><td><strong>{{ key }}</strong></td><td>{{ value }}</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
