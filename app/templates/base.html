<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SITinform{% endblock %}</title>
  {% block head_extra %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <!-- Jinja2 auto-escapes variables by default — a second layer against XSS (B2) -->
  <main class="page-shell {% block main_class %}{% endblock %}">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <section class="page-messages" aria-label="Messages">
          {% for category, message in messages %}
            <p class="flash flash-{{ category }}">{{ message }}</p>
          {% endfor %}
        </section>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
