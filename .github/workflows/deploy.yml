name: Deploy (production)

# Continuous deployment: when develop is merged into main, redeploy the EC2 stack.
on:
  push:
    branches: [main]

permissions:
  contents: read

# Never run two deploys at once; don't cancel an in-flight deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Add required reviewers / secrets under Settings > Environments > production.
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_APP_DIR }}"
            git fetch --all
            git reset --hard origin/main
            # .env lives only on the server (git-ignored) and must already exist.
            docker compose -f compose.prod.yaml up -d --build
            docker image prune -f
            # Smoke check: the app is reached via nginx (the only host-published
            # service). The web container only exposes 5000 on the internal
            # docker network, so curling host:5000 would always refuse.
            # Retry to absorb container startup races instead of a flat sleep.
            for i in $(seq 1 10); do
              if curl -fsSk https://localhost/healthz || curl -fsS http://localhost/healthz; then
                echo "healthz OK"
                exit 0
              fi
              echo "waiting for app to come up ($i/10)..."
              sleep 3
            done
            echo "Smoke check failed: /healthz never responded" >&2
            exit 1
